<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Borra las rayas</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
  }
  * { box-sizing: border-box; }
  #lienzo {
    position: fixed;
    inset: 0;
    display: block;
    touch-action: none;
  }
  #pista {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    max-width: 84vw;
    text-align: center;
    color: #8a8a8a;
    font-size: 15px;
    letter-spacing: 0.02em;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #boton {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    z-index: 10;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 13px 24px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    color: #f0f0f0;
    font-size: 15px;
    font-weight: 600;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
    transition: background 0.2s;
  }
  #boton:hover { background: rgba(255, 255, 255, 0.18); }
  #boton:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
</style>

<canvas id="lienzo"></canvas>
<div id="pista">Pasa el dedo para borrar las rayas</div>
<button id="boton">↺ Reiniciar</button>

<script>
  const canvas = document.getElementById("lienzo");
  const ctx = canvas.getContext("2d");
  const pista = document.getElementById("pista");
  const boton = document.getElementById("boton");

  let ancho = 0, alto = 0, dpr = 1;
  const radioBorrado = 28;
  let ultimoPunto = null, borrando = false;

  // --- Definicion de las 3 rayas (anchas y granuladas) ---
  const LINEAS = [
    { x: 0.28, top: 0.16, bottom: 0.74, lean: 0.02, fase: 11 },
    { x: 0.50, top: 0.12, bottom: 0.88, lean: 0.01, fase: 27 },
    { x: 0.72, top: 0.18, bottom: 0.72, lean: 0.03, fase: 41 },
  ];
  const MEDIO_ANCHO = 0.028;   // fraccion del ancho -> media anchura de cada raya
  const POR_LINEA = 1100;      // granos por raya

  // gaussiano aprox. en [-~1.6, ~1.6]
  function gauss() {
    return (Math.random() + Math.random() + Math.random() - 1.5) / 1.5;
  }

  // Cada grano guarda datos normalizados para recolocarse en cualquier tamaño
  const granos = [];
  function crearGranos() {
    granos.length = 0;
    for (let li = 0; li < LINEAS.length; li++) {
      for (let i = 0; i < POR_LINEA; i++) {
        granos.push({
          linea: li,
          f: Math.random(),                 // posicion a lo largo de la raya (0..1)
          off: gauss(),                     // dispersion horizontal en la raya
          tam: Math.random() < 0.28 ? 2 : (Math.random() < 0.06 ? 3 : 1),
          alpha: 0.55 + Math.random() * 0.45,
          x: 0, y: 0,
          vivo: true,
        });
      }
    }
  }

  function recalcularPosiciones() {
    const spread = Math.max(4, MEDIO_ANCHO * ancho);
    for (const g of granos) {
      const L = LINEAS[g.linea];
      const topY = L.top * alto, botY = L.bottom * alto;
      const largo = botY - topY;
      const baseX = L.x * ancho;
      const wobble =
        Math.sin(g.f * 9 + L.fase) * spread * 0.55 +
        Math.sin(g.f * 21 + L.fase * 2) * spread * 0.3;
      g.x = baseX + L.lean * ancho * g.f + wobble + g.off * spread;
      g.y = topY + g.f * largo;
    }
  }

  function bucle() {
    ctx.clearRect(0, 0, ancho, alto); // transparente -> se ve el fondo negro
    for (const g of granos) {
      if (!g.vivo) continue;
      ctx.fillStyle = "rgba(255,255,255," + g.alpha + ")";
      ctx.fillRect(g.x, g.y, g.tam, g.tam);
    }
    requestAnimationFrame(bucle);
  }

  function ajustarTamano() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    ancho = window.innerWidth;
    alto = window.innerHeight;
    canvas.width = Math.floor(ancho * dpr);
    canvas.height = Math.floor(alto * dpr);
    canvas.style.width = ancho + "px";
    canvas.style.height = alto + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    recalcularPosiciones();
  }

  function reiniciar() {
    for (const g of granos) g.vivo = true;
    pista.style.opacity = "1";
  }

  // --- Borrado con el dedo ---
  function borrarEn(x, y) {
    const r2 = radioBorrado * radioBorrado;
    for (const g of granos) {
      if (!g.vivo) continue;
      const dx = g.x - x, dy = g.y - y;
      if (dx * dx + dy * dy <= r2) g.vivo = false;
    }
  }
  function borrarLinea(x1, y1, x2, y2) {
    const dist = Math.hypot(x2 - x1, y2 - y1);
    const pasos = Math.max(1, Math.floor(dist / (radioBorrado / 2)));
    for (let i = 0; i <= pasos; i++) {
      const t = i / pasos;
      borrarEn(x1 + (x2 - x1) * t, y1 + (y2 - y1) * t);
    }
  }
  function posicion(e) {
    const t = e.touches && e.touches[0] ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }
  function inicio(e) {
    borrando = true;
    pista.style.opacity = "0";
    const p = posicion(e);
    ultimoPunto = p;
    borrarEn(p.x, p.y);
    e.preventDefault();
  }
  function mover(e) {
    if (!borrando) return;
    const p = posicion(e);
    if (ultimoPunto) borrarLinea(ultimoPunto.x, ultimoPunto.y, p.x, p.y);
    ultimoPunto = p;
    e.preventDefault();
  }
  function fin() { borrando = false; ultimoPunto = null; }

  canvas.addEventListener("mousedown", inicio);
  window.addEventListener("mousemove", mover);
  window.addEventListener("mouseup", fin);
  canvas.addEventListener("touchstart", inicio, { passive: false });
  canvas.addEventListener("touchmove", mover, { passive: false });
  canvas.addEventListener("touchend", fin);
  canvas.addEventListener("touchcancel", fin);
  window.addEventListener("resize", ajustarTamano);
  boton.addEventListener("click", reiniciar);

  crearGranos();
  ajustarTamano();
  bucle();
</script>

</html>
